name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            output_name: sentinel-macos-arm64
          # Windows build
          - os: windows-latest
            goos: windows
            goarch: amd64
            output_name: sentinel-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'

      - name: Build Binary
        run: go build -o ${{ matrix.output_name }} ./cmd/app
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0

      - name: Run Tests
        run: go test ./...

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.output_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-installer:
    name: Attach install.sh to Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Upload install.sh to Release
        uses: softprops/action-gh-release@v1
        with:
          files: install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
